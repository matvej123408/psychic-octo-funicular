<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Departure Board</title>

<style>
body {
    margin: 0;
    background: black;
    color: #ffcc00;
    font-family: monospace;
}

header {
    font-size: 36px;
    padding: 10px;
    border-bottom: 2px solid #ffcc00;
}

.controls {
    padding: 10px;
}

input {
    padding: 8px;
    font-size: 16px;
    width: 250px;
}

button {
    padding: 8px;
    font-size: 16px;
}

#results {
    background: #111;
    max-width: 300px;
    margin-top: 5px;
}

.result {
    padding: 6px;
    cursor: pointer;
}

.result:hover {
    background: #333;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 22px;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #333;
    text-align: center;
}

.delay { color: red; }
.ontime { color: #00ff00; }

</style>
</head>

<body>

<header>DEPARTURES</header>

<div class="controls">
    <input id="search" placeholder="Search station...">
    <button onclick="search()">Search</button>
    <button onclick="fullscreen()">Fullscreen</button>

    <div id="results"></div>
</div>

<table>
<thead>
<tr>
<th>Train</th>
<th>Destination</th>
<th>Time</th>
<th>Platform</th>
<th>Status</th>
</tr>
</thead>
<tbody id="board"></tbody>
</table>

<script>
let stationId = "8011160"; // Berlin default

// 🔁 Proxy fallback system
const proxies = [
    url => "https://api.allorigins.win/raw?url=" + encodeURIComponent(url),
    url => "https://corsproxy.io/?" + encodeURIComponent(url)
];

async function fetchWithFallback(url) {
    for (let p of proxies) {
        try {
            const res = await fetch(p(url));
            const text = await res.text();

            // detect HTML error
            if (text.startsWith("<")) continue;

            return JSON.parse(text);
        } catch (e) {
            console.log("Proxy failed, trying next...");
        }
    }

    throw new Error("All proxies failed");
}

// 🔍 SEARCH stations
async function search() {
    const q = document.getElementById("search").value;
    if (!q) return;

    try {
        const data = await fetchWithFallback(
            `https://v5.transport.rest/locations?query=${encodeURIComponent(q)}&results=5`
        );

        const box = document.getElementById("results");
        box.innerHTML = "";

        data.forEach(s => {
            const div = document.createElement("div");
            div.className = "result";
            div.innerText = s.name;

            div.onclick = () => {
                stationId = s.id;
                box.innerHTML = "";
                load();
            };

            box.appendChild(div);
        });

    } catch (e) {
        console.error("Search failed");
    }
}

// 🚆 LOAD departures
async function load() {
    try {
        const data = await fetchWithFallback(
            `https://v5.transport.rest/stops/${stationId}/departures?duration=60`
        );

        const board = document.getElementById("board");
        board.innerHTML = "";

        (data.departures || []).slice(0, 12).forEach(d => {
            const row = document.createElement("tr");

            const planned = new Date(d.plannedWhen);
            const actual = d.when ? new Date(d.when) : planned;

            const delay = Math.round((actual - planned) / 60000);

            const time = planned.toLocaleTimeString([], {
                hour: "2-digit",
                minute: "2-digit"
            });

            let status = "ON TIME";
            let cls = "ontime";

            if (delay > 0) {
                status = "+" + delay + " min";
                cls = "delay";
            }

            row.innerHTML = `
                <td>${d.line?.name || "?"}</td>
                <td>${d.direction}</td>
                <td>${time}</td>
                <td>${d.platform || "--"}</td>
                <td class="${cls}">${status}</td>
            `;

            board.appendChild(row);
        });

    } catch (e) {
        console.error("Load failed");
    }
}

// 🖥 fullscreen
function fullscreen() {
    document.documentElement.requestFullscreen();
}

// auto refresh
load();
setInterval(load, 60000);
</script>

</body>
</html>
