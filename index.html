<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>PARTENZE</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: monospace;
    color: #ffcc00;
}

header {
    background: #111;
    color: #ffcc00;
    font-size: 42px;
    padding: 15px;
    text-align: left;
}

.station {
    font-size: 26px;
    padding-left: 15px;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 26px;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #222;
    text-align: center;
}

th {
    color: white;
}

.delay {
    color: red;
    font-weight: bold;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0.3; }
}

.ontime {
    color: #00ff00;
}

.cancelled {
    color: gray;
}

.controls {
    padding: 10px;
}

button {
    padding: 8px;
    font-size: 16px;
}
</style>
</head>

<body>

<header>
PARTENZE
<div class="station" id="stationName">LA SPEZIA CENTRALE</div>
</header>

<div class="controls">
<button onclick="fullscreen()">Fullscreen</button>
</div>

<table>
<thead>
<tr>
<th>Treno</th>
<th>Destinazione</th>
<th>Ora</th>
<th>Binario</th>
<th>Stato</th>
</tr>
</thead>
<tbody id="board"></tbody>
</table>

<script>
const majorCities = ["Roma Termini","Milano Centrale","Torino Porta Nuova","Bologna Centrale"];
const regionalCities = ["Pisa Centrale","Genova P. Principe","Lucca","Livorno"];

function pickDestination() {
    return Math.random() > 0.5
        ? majorCities[Math.floor(Math.random()*majorCities.length)]
        : regionalCities[Math.floor(Math.random()*regionalCities.length)];
}

function getTrainType(dest) {
    if (majorCities.includes(dest)) {
        return Math.random() > 0.5 ? "FR" : "IC";
    }
    return Math.random() > 0.3 ? "R" : "RV";
}

function generateData() {
    let data = [];

    for (let i = 0; i < 12; i++) {
        const now = new Date();
        now.setMinutes(now.getMinutes() + i * 5);

        const dest = pickDestination();
        const type = getTrainType(dest);

        const delay = Math.random() > 0.7 ? Math.floor(Math.random() * 15) : 0;

        data.push({
            train: type + " " + (Math.floor(Math.random()*9000)+1000),
            dest: dest,
            time: now,
            delay: delay,
            platform: Math.floor(Math.random()*10)+1,
            cancelled: Math.random() > 0.95
        });
    }

    return data;
}

function render(data) {
    const board = document.getElementById("board");
    board.innerHTML = "";

    data.forEach(t => {
        const row = document.createElement("tr");

        const time = t.time.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});

        let status = "IN ORARIO";
        let cls = "ontime";

        if (t.delay > 0) {
            status = "RITARDO " + t.delay + "'";
            cls = "delay";
        }

        if (t.cancelled) {
            status = "CANCELLATO";
            cls = "cancelled";
        }

        row.innerHTML = `
            <td>${t.train}</td>
            <td>${t.dest}</td>
            <td>${time}</td>
            <td>${t.platform}</td>
            <td class="${cls}">${status}</td>
        `;

        board.appendChild(row);
    });
}

function update() {
    render(generateData());
}

function fullscreen() {
    document.documentElement.requestFullscreen();
}

update();
setInterval(update, 60000);
</script>

</body>
</html>
